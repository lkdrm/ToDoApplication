<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do List</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <h1 class="app-title">Create a task</h1>

        <div class="main-card">
            <div class="inner-box">
                <div class="labels">
                    <span class="label-item">TITLE</span>
                    <span class="label-item">Date</span>
                </div>
                <input type="text" id="taskTitle" placeholder="Title" class="input-field title-input">
                <textarea id="taskDescription" placeholder="What need to do?" class="input-field desc-input"></textarea>
            </div>
            <button id="addTaskBtn" class="save-btn">Save</button>
        </div>

        <ul id="taskList" class="task-list"></ul>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
